name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Tag must match manifest version
        run: |
          MANIFEST=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST" != "$TAG" ]; then
            echo "manifest.json version ($MANIFEST) != tag ($TAG)"; exit 1
          fi

      - name: Tests
        run: |
          node test/detector.test.js
          node test/merge.test.js

      - name: Build store zip
        run: ./tools/package.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "**⬇️ Install:** download \`slop-filter-for-x-${GITHUB_REF_NAME#v}.zip\` below, unzip, and load it via chrome://extensions → Load unpacked."
            echo
            echo "_The \"Source code\" archives are GitHub's automatic full-repo snapshots (tests, docs, tooling) — not the extension bundle._"
            echo
          } > /tmp/notes-header.md
          # --notes-file + --generate-notes: our header first, auto-notes appended
          gh release create "$GITHUB_REF_NAME" dist/*.zip \
            --title "Slop Filter for X $GITHUB_REF_NAME" \
            --generate-notes \
            --notes-file /tmp/notes-header.md
